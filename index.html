<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e14" />
<title>OVER0 PRO AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:radial-gradient(ellipse at top,#131a26,#0a0e14 60%);color:#fff;min-height:100vh;font-size:15px;overflow-x:hidden}
button{font:inherit;color:inherit;cursor:pointer;border:0;background:none;outline:none}
input,select,textarea{font:inherit;color:#fff;background:#161c27;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:11px 12px;width:100%;outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:#00ff88;box-shadow:0 0 0 3px rgba(0,255,136,.12)}
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:52px 1fr;min-height:100vh;max-width:100vw}
.sidebar{grid-area:1/1/3/2;background:#0f141c;border-right:1px solid rgba(255,255,255,.05);padding:14px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:34px;height:34px;background:linear-gradient(135deg,#00ff88,#00b4ff);color:#001a10;font-weight:900;font-size:13px;display:grid;place-items:center;border-radius:8px;flex-shrink:0}
.brand-text{font-weight:800;letter-spacing:1px;font-size:14px}
.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav button{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#aaa;text-align:left;font-size:13px;width:100%;transition:background .15s}
.nav button:hover{background:#161c27;color:#fff}
.nav button.active{background:rgba(0,255,136,.1);color:#fff;box-shadow:inset 3px 0 0 #00ff88}
.conn-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:#161c27;border-radius:999px;font-size:11px;color:#aaa;align-self:flex-start}
.conn-pill .dot{width:7px;height:7px;border-radius:50%;background:#ff4d6d}
.conn-pill.connected .dot{background:#00ff88;box-shadow:0 0 6px #00ff88}
.conn-pill.connecting .dot{background:#ffa500;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.topbar{background:#0f141c;border-bottom:1px solid rgba(255,255,255,.05);padding:0 14px;display:flex;align-items:center;gap:10px;grid-area:1/2/2/3}
.menu-btn{padding:6px;border-radius:6px;display:none;font-size:20px}
.topbar-title{font-weight:600;flex:1;font-size:15px}
.muted{color:#8a96a8}
.main{grid-area:2/2/3/3;overflow-y:auto;overflow-x:hidden}
.view{padding:18px;max-width:1400px;margin:0 auto}
.card{background:#161c27;border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:18px;margin-bottom:14px}
.card-title{font-size:11px;text-transform:uppercase;color:#8a96a8;letter-spacing:1px;margin-bottom:8px}
.card-value{font-size:24px;font-weight:700}
.grid-2{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:14px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:8px;font-weight:600;font-size:13px;background:#1e2533;color:#fff;border:1px solid rgba(255,255,255,.1);cursor:pointer;min-height:42px;transition:all .15s}
.btn:hover{background:#2a3344}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#00ff88,#00cc6a);color:#001a10;border-color:transparent}
.btn-primary:hover{box-shadow:0 4px 16px rgba(0,255,136,.4)}
.btn-danger{background:linear-gradient(135deg,#ff4d6d,#c41e3a);color:#fff;border-color:transparent}
.btn-warning{background:linear-gradient(135deg,#ffa500,#ff7b00);color:#1a0d00;border-color:transparent}
.btn-lg{padding:14px 18px;font-size:14px}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;background:#1e2533}
.badge.success{background:rgba(0,255,136,.12);color:#00ff88}
.badge.loss{background:rgba(255,77,109,.12);color:#ff4d6d}
.badge.info{background:rgba(0,180,255,.12);color:#00b4ff}
.label{font-size:12px;color:#8a96a8;margin-bottom:5px;display:block}
.field{margin-bottom:14px}
.profit{color:#00ff88}.loss{color:#ff4d6d}.muted{color:#8a96a8}.center{text-align:center}
.huge-num{font-size:32px;font-weight:900;background:linear-gradient(135deg,#00ff88,#00b4ff);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.1}
@media(min-width:600px){.huge-num{font-size:40px}}
.tick-display{text-align:center;padding:20px}
.tick-digit{font-size:72px;font-weight:900;line-height:1;background:linear-gradient(135deg,#00ff88,#00b4ff);-webkit-background-clip:text;background-clip:text;color:transparent}
@media(min-width:600px){.tick-digit{font-size:96px}}
.tick-price{font-size:18px;margin-top:6px}
.tick-meta{display:flex;justify-content:center;gap:10px;margin-top:10px;color:#8a96a8;font-size:11px;flex-wrap:wrap}
.trade-controls{display:grid;gap:10px;grid-template-columns:repeat(2,1fr);margin-top:14px}
@media(min-width:600px){.trade-controls{grid-template-columns:repeat(4,1fr)}}
.live-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:rgba(138,150,168,.15);font-size:11px;font-weight:600}
.live-pill.running{background:rgba(255,77,109,.15);color:#ff4d6d}
.live-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.live-pill.running .dot{animation:pulse 1s infinite}
.digit-bars{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;align-items:end;height:110px;padding:8px 0 24px}
.digit-bar{background:linear-gradient(180deg,#00ff88,#00b4ff);border-radius:3px 3px 0 0;min-height:3px;position:relative;transition:height .4s}
.digit-bar .lbl{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10px;color:#8a96a8}
.heatmap{display:grid;grid-template-columns:repeat(10,1fr);gap:3px}
.heat-cell{aspect-ratio:1;border-radius:5px;display:grid;place-items:center;font-weight:700;font-size:13px;background:#1e2533;transition:background .3s}
.strat-row,.settings-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);gap:10px;flex-wrap:wrap}
.strat-row:last-child,.settings-row:last-child{border-bottom:0}
.switch{position:relative;width:42px;height:22px;background:#1e2533;border-radius:11px;cursor:pointer;flex-shrink:0}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .2s}
.switch.on{background:rgba(0,255,136,.3)}
.switch.on::after{left:22px;background:#00ff88}
.journal-list{display:flex;flex-direction:column;gap:6px}
.journal-item{display:flex;align-items:center;gap:10px;padding:10px;background:#1e2533;border-radius:8px;flex-wrap:wrap}
.journal-item>div{min-width:0}
.digit-badge{width:32px;height:32px;border-radius:6px;display:grid;place-items:center;font-weight:800;background:#161c27;flex-shrink:0}
.digit-badge.win{background:rgba(0,255,136,.2);color:#00ff88}
.digit-badge.loss{background:rgba(255,77,109,.2);color:#ff4d6d}
.login-wrap{position:fixed;inset:0;display:grid;place-items:center;background:#0a0e14;padding:16px;z-index:1000;overflow-y:auto}
.login-card{width:100%;max-width:420px;background:#161c27;border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:24px}
@media(min-width:600px){.login-card{padding:32px}}
.input-wrap{position:relative}
.toggle-eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);padding:4px 8px;cursor:pointer;color:#aaa;font-size:14px}
.warn-box{background:rgba(255,165,0,.08);border:1px solid rgba(255,165,0,.25);color:#ffa500;padding:10px;border-radius:8px;font-size:12px;margin-top:12px;line-height:1.5}
.toast-container{position:fixed;top:60px;right:12px;left:12px;z-index:2000;display:flex;flex-direction:column;gap:6px;max-width:380px;margin:0 auto;pointer-events:none}
.toast{padding:11px 14px;background:#1e2533;border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.5);pointer-events:auto;animation:slideIn .25s ease}
.toast.success{border-left:3px solid #00ff88}
.toast.error{border-left:3px solid #ff4d6d}
.toast.info{border-left:3px solid #00b4ff}
.toast.warn{border-left:3px solid #ffa500}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.err-screen{position:fixed;inset:0;background:#0a0e14;color:#ff4d6d;padding:20px;font-family:monospace;white-space:pre-wrap;overflow:auto;z-index:9999;font-size:12px;line-height:1.5}
.divider{height:1px;background:rgba(255,255,255,.05);margin:14px 0}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #001a10;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none}
.overlay.open{display:block}
@media(max-width:768px){
.app{grid-template-columns:1fr;grid-template-rows:52px 1fr}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;z-index:100;transform:translateX(-100%);transition:transform .25s ease}
.sidebar.open{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,.8)}
.menu-btn{display:inline-flex}
.topbar{grid-area:1/1/2/2}
.main{grid-area:2/1/3/2}
}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 8px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
th{font-size:11px;text-transform:uppercase;color:#8a96a8;font-weight:600;letter-spacing:1px}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">O0</div>
      <div class="brand-text">OVER0 PRO</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="conn-pill" id="conn-pill"><span class="dot"></span><span class="text">Disconnected</span></div>
  </aside>
  <header class="topbar">
    <button class="menu-btn" id="menu-toggle">☰</button>
    <div class="topbar-title" id="topbar-title">OVER0 PRO AI</div>
    <div class="muted" id="server-time" style="font-size:12px">--:--:--</div>
  </header>
  <main class="main">
    <section class="view" id="view"></section>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
"use strict";

/* ===== ERROR HANDLER ===== */
window.onerror = function(msg, url, line, col, err) {
  const d = document.createElement('div');
  d.className = 'err-screen';
  d.textContent = '⚠️ ERROR:\n' + msg + '\n\nLine: ' + line + '\nColumn: ' + col + '\n\n' + (err && err.stack || '');
  document.body.appendChild(d);
  console.error(err);
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  console.error('Unhandled rejection:', e.reason);
  const t = document.createElement('div');
  t.className = 'toast error';
  t.textContent = 'Error: ' + (e.reason && e.reason.message || e.reason);
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 5000);
});

/* ===== CONFIG ===== */
const APP_ID = '1086';
const WS_URL = 'wss://ws.derivws.com/websockets/v3';

/* ===== STATE ===== */
const State = {
  loggedIn: false, account: null, conn: 'disconnected', latency: null, serverTime: null,
  symbol: 'R_100', spot: null, lastDigit: null, tickCount: 0, ticksPerMin: 0,
  proposal: null, openContract: null, engineState: 'idle',
  strategyParams: { tradeEveryTicks: 5, stake: 1, maxConsecutiveLosses: 5, cooldown: 3 },
  session: { trades: 0, wins: 0, losses: 0, profit: 0, loss: 0, startBalance: 0 },
  digitWindow: []
};
const listeners = new Set();
function onChange(fn) { listeners.add(fn); }
function emitChange() { listeners.forEach(fn => { try { fn(State); } catch(e) { console.error(e); } }); }
function update(patch) { Object.assign(State, patch); emitChange(); }

/* ===== STORAGE (persists across reloads) ===== */
const Storage = {
  get(k) { try { const v = localStorage.getItem('over0:' + k); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
  set(k, v) { try { localStorage.setItem('over0:' + k, JSON.stringify(v)); return true; } catch(e) { console.error('Storage error', e); return false; } },
  del(k) { try { localStorage.removeItem('over0:' + k); } catch(e) {} }
};

/* ===== UTILITIES ===== */
const fmt = {
  money: (n, c) => { if (n == null || isNaN(n)) return '—'; c = c || 'USD'; return (n < 0 ? '-' : '') + Math.abs(+n).toFixed(2) + ' ' + c; },
  num: (n, d) => { d = d || 2; return n == null || isNaN(n) ? '—' : (+n).toFixed(d); },
  pct: (n) => { return n == null || isNaN(n) ? '—' : (+n * 100).toFixed(1) + '%'; }
};

function toast(msg, type) {
  type = type || 'info';
  const c = document.getElementById('toast-container');
  if (!c) return;
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { if (t.parentNode) t.remove(); }, 4000);
}

function el(tag, attrs, children) {
  const n = document.createElement(tag);
  attrs = attrs || {};
  children = children || [];
  for (const k in attrs) {
    const v = attrs[k];
    if (v == null || v === false) continue;
    if (k === 'class') n.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(n.style, v);
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v === true) n.setAttribute(k, '');
    else n.setAttribute(k, v);
  }
  const arr = Array.isArray(children) ? children : [children];
  for (const c of arr) {
    if (c == null || c === false) continue;
    n.appendChild(c.nodeType ? c : document.createTextNode(String(c)));
  }
  return n;
}

/* ===== WEBSOCKET ===== */
const WS = {
  ws: null, handlers: new Map(), nextId: 1, connected: false, attempt: 0, shouldRun: false,
  connect() {
    if (this.ws && (this.ws.readyState === 0 || this.ws.readyState === 1)) return;
    this.shouldRun = true;
    setConn('connecting');
    try { this.ws = new WebSocket(WS_URL + '?app_id=' + APP_ID + '&l=en&brand=over0pro'); }
    catch (e) { console.error(e); this._reconnect(); return; }
    this.ws.onopen = () => { this.attempt = 0; this.connected = true; setConn('connected'); };
    this.ws.onmessage = (e) => this._onMsg(e);
    this.ws.onerror = () => {};
    this.ws.onclose = () => { this.connected = false; setConn('disconnected'); if (this.shouldRun) this._reconnect(); };
  },
  disconnect() {
    this.shouldRun = false;
    try { this.ws && this.ws.close(); } catch(e) {}
    this.ws = null;
  },
  _reconnect() {
    const delay = Math.min(30000, 1000 * Math.pow(1.7, this.attempt++));
    setConn('reconnecting');
    setTimeout(() => { if (this.shouldRun) this.connect(); }, delay);
  },
  send(obj) {
    return new Promise((resolve) => {
      if (!this.ws || this.ws.readyState !== 1) { resolve({ error: { message: 'Not connected' } }); return; }
      const id = obj.req_id || this.nextId++;
      this.handlers.set(id, resolve);
      try { this.ws.send(JSON.stringify(Object.assign({}, obj, { req_id: id }))); }
      catch (e) { this.handlers.delete(id); resolve({ error: { message: e.message } }); }
    });
  },
  _onMsg(e) {
    let m;
    try { m = JSON.parse(e.data); } catch { return; }
    if (m.ping) { try { this.ws.send(JSON.stringify({ pong: m.ping })); } catch {} return; }
    if (m.req_id != null) {
      const h = this.handlers.get(m.req_id);
      if (h) { this.handlers.delete(m.req_id); h(m); }
    }
    handleMsg(m);
  }
};

function setConn(c) {
  update({ conn: c });
  const pill = document.getElementById('conn-pill');
  if (pill) {
    pill.className = 'conn-pill ' + c;
    pill.querySelector('.text').textContent = c;
  }
}

/* ===== MESSAGE HANDLER ===== */
const tickHandlers = [];
const contractHandlers = [];
function handleMsg(m) {
  if (!m || !m.msg_type) return;
  if (m.msg_type === 'tick' && m.tick) {
    const q = m.tick.quote;
    const parts = String(q).split('.');
    const digit = parts[1] ? parts[1][0] : String(q).slice(-1);
    tickHandlers.forEach(h => h({ symbol: m.tick.symbol, quote: q, epoch: m.tick.epoch, digit: digit }));
  }
  if (m.msg_type === 'balance' && m.balance && State.account) {
    const newBal = +m.balance.balance;
    if (!isNaN(newBal)) update({ account: Object.assign({}, State.account, { balance: newBal }) });
  }
  if (m.msg_type === 'time' && m.time) update({ serverTime: m.time });
  if (m.msg_type === 'proposal_open_contract' && m.proposal_open_contract) {
    contractHandlers.forEach(h => h(m.proposal_open_contract));
  }
  if (m.msg_type === 'buy' && m.buy && m.buy.contract_id) {
    update({ openContract: { id: m.buy.contract_id, ...m.buy, status: 'open' } });
    toast('Contract #' + m.buy.contract_id + ' purchased', 'success');
    WS.send({ proposal_open_contract: 1, contract_id: m.buy.contract_id, subscribe: 1 });
  }
}

/* ===== API HELPERS ===== */
function apiAuthorize(token) { return WS.send({ authorize: token }); }
function apiBalance() { return WS.send({ balance: 1, subscribe: 1 }); }
function apiTicks(sym) { return WS.send({ ticks: sym, subscribe: 1 }); }

/* ===== JOURNAL (saves trades to localStorage) ===== */
const Journal = {
  _list: Storage.get('journal') || [],
  get list() { return this._list; },
  set list(v) { this._list = v; Storage.set('journal', v); },
  add(e) {
    e.id = Date.now() + '-' + Math.random().toString(36).slice(2, 7);
    this._list.unshift(e);
    if (this._list.length > 500) this._list.length = 500;
    Storage.set('journal', this._list);
  },
  all() { return this._list; },
  clear() { this._list = []; Storage.set('journal', this._list); }
};

/* ===== TRADING ENGINE (fixed: DIGITOVER, string amounts) ===== */
const Engine = {
  busy: false, _sinceLast: 0, _consecLoss: 0, _cooldown: 0,
  init() {
    tickHandlers.push(t => this._onTick(t));
    contractHandlers.push(c => this._onContract(c));
  },
  start() { update({ engineState: 'running' }); toast('Trading started', 'success'); },
  pause() { update({ engineState: 'paused' }); toast('Trading paused', 'warn'); },
  resume() { update({ engineState: 'running' }); toast('Trading resumed', 'info'); },
  stop() { update({ engineState: 'stopped' }); toast('Trading stopped', 'warn'); },
  emergencyStop() { update({ engineState: 'idle' }); toast('EMERGENCY STOP', 'error'); },
  setParams(p) { State.strategyParams = Object.assign({}, State.strategyParams, p); },

  _onTick(t) {
    this._sinceLast++;
    if (this._cooldown > 0) this._cooldown--;
    const win = State.digitWindow.concat([{ d: t.digit, e: t.epoch }]);
    if (win.length > 200) win.shift();
    update({ lastDigit: t.digit, spot: t.quote, tickCount: State.tickCount + 1, digitWindow: win });

    if (State.engineState !== 'running' || this.busy) return;
    if (this._sinceLast < State.strategyParams.tradeEveryTicks) return;
    if (this._cooldown > 0) return;
    this._enterTrade();
  },

  async _enterTrade() {
    if (this.busy) return;
    this.busy = true;
    try {
      const p = State.strategyParams;
      const currency = (State.account && State.account.currency) || 'USD';
      const req = {
        proposal: 1,
        amount: String(p.stake),
        basis: 'stake',
        contract_type: 'DIGITOVER',
        currency: currency,
        duration: 1,
        duration_unit: 't',
        symbol: State.symbol,
        barrier: '0'
      };
      update({ proposal: Object.assign({}, req, { status: 'requesting' }) });
      const r = await WS.send(req);
      if (r.error) {
        update({ proposal: Object.assign({}, r.error, { status: 'error' }) });
        toast(r.error.message, 'error');
        return;
      }
      if (!r.proposal || !r.proposal.id) {
        toast('No proposal returned', 'error');
        return;
      }
      update({ proposal: Object.assign({}, r.proposal, { status: 'ready' }) });
      const buy = await WS.send({ buy: r.proposal.id, price: String(r.proposal.ask_price) });
      if (buy.error) {
        update({ proposal: Object.assign({}, buy.error, { status: 'error' }) });
        toast(buy.error.message, 'error');
      }
    } catch (e) {
      console.error('Trade error', e);
      toast('Trade error: ' + e.message, 'error');
    } finally {
      this.busy = false;
    }
  },

  _onContract(c) {
    if (!c || !c.contract_id) return;
    if (!State.openContract || State.openContract.id !== c.contract_id) return;
    if (c.is_sold) {
      const pnl = +c.profit || 0;
      const win = pnl > 0;
      // CRITICAL FIX: Save trade to journal (was broken before)
      Journal.add({
        time: Date.now(),
        contractId: c.contract_id,
        symbol: State.symbol,
        stake: +c.buy_price,
        payout: +c.payout,
        profit: pnl,
        win: win,
        barrier: c.barrier,
        type: c.contract_type
      });
      const s = Object.assign({}, State.session);
      s.trades++;
      if (win) { s.wins++; s.profit += pnl; this._consecLoss = 0; }
      else { s.losses++; s.loss += Math.abs(pnl); this._consecLoss++; if (this._consecLoss >= State.strategyParams.maxConsecutiveLosses) { this._cooldown = State.strategyParams.cooldown; this._consecLoss = 0; } }
      update({ session: s, openContract: Object.assign({}, State.openContract, c, { status: 'closed' }), lastResult: { profit: pnl, win: win } });
      this._sinceLast = 0;
      toast((win ? 'WIN ' : 'LOSS ') + pnl.toFixed(2) + ' ' + (State.account ? State.account.currency : ''), win ? 'success' : 'error');
    } else {
      update({ openContract: Object.assign({}, State.openContract, c) });
    }
  }
};

const routes = {};
function route(name, fn) { routes[name] = fn; }
function go(name) {
  const fn = routes[name];
  if (!fn) return;
  const root = document.getElementById('view');
  root.innerHTML = '';
  document.getElementById('topbar-title').textContent = name.charAt(0).toUpperCase() + name.slice(1);
  try { fn(root); }
  catch (e) { root.innerHTML = '<div class="card" style="color:#ff4d6d">View error: ' + e.message + '</div>'; console.error(e); }
  document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.route === name));
  if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
}

    submit.disabled = true;

        session: Object.assign({}, State.session, { startBalance: cur })

      toast('Authenticated!', 'success');
      go('dashboard');

route('settings', function(root) {
  const logoutBtn = el('button', { class: 'btn btn-danger' }, ['Logout & Clear Token']);
  logoutBtn.onclick = () => {
    if (confirm('Disconnect and remove stored token?')) {
      Storage.del('token');
      update({ loggedIn: false, account: null, session: { trades: 0, wins: 0, losses: 0, profit: 0, loss: 0, startBalance: 0 } });
      WS.disconnect();
      toast('Logged out', 'info');
      go('login');
    }
  };

  root.appendChild(el('div', { class: 'card' }, [
    el('h3', { style: { marginBottom: '12px', fontSize: '16px' } }, ['App Info']),
    el('div', { class: 'settings-row' }, [el('div', {}, ['App ID (default)']), el('div', { class: 'muted' }, [APP_ID])]),
    el('div', { class: 'settings-row' }, [el('div', {}, ['WebSocket']), el('div', { class: 'muted', style: { fontSize: '11px' } }, [WS_URL])]),
    el('div', { class: 'divider' }),
    el('h3', { style: { marginBottom: '12px', color: '#ff4d6d', fontSize: '16px' } }, ['Danger Zone']),
    logoutBtn
  ]));
});

/* ===== NAVIGATION ===== */
const NAV = [
  { id: 'dashboard', icon: '📊', label: 'Dashboard' },
  { id: 'trade', icon: '💹', label: 'Trade' },
  { id: 'research', icon: '🔍', label: 'Research' },
  { id: 'strategy', icon: '⭐', label: 'Strategy' },
  { id: 'statistics', icon: '📈', label: 'Stats' },
  { id: 'journal', icon: '📓', label: 'Journal' },
  { id: 'settings', icon: '⚙️', label: 'Settings' },
  { id: 'help', icon: '❓', label: 'Help' },
  { id: 'about', icon: 'ℹ️', label: 'About' }
];
const navEl = document.getElementById('nav');
NAV.forEach(item => {
  const b = el('button', { 'data-route': item.id }, [el('span', {}, [item.icon + ' ']), el('span', {}, [item.label])]);
  b.onclick = () => go(item.id);
  navEl.appendChild(b);
});

/* ===== MOBILE MENU ===== */
document.getElementById('menu-toggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
};

/* ===== CLOCK ===== */
setInterval(() => {
  const e = document.getElementById('server-time');
  if (e && State.serverTime) e.textContent = new Date(State.serverTime * 1000).toTimeString().slice(0, 8);
}, 1000);

/* ===== BOOT ===== */
(async function boot() {
  // Load saved strategy
  const strat = Storage.get('strategy');
  if (strat && strat.params) update({ strategyParams: strat.params });

  // Try auto-login with saved token
  const token = Storage.get('token');
  if (token) {
    try {
      WS.connect();
      await new Promise((res, rej) => {
        const t = setTimeout(() => rej(new Error('Connection timeout')), 12000);
        const i = setInterval(() => { if (WS.connected) { clearTimeout(t); clearInterval(i); res(); } }, 100);
      });
      const auth = await apiAuthorize(token);
      if (!auth || !auth.loginid) throw new Error('No auth');
      const bal = await apiBalance();
      const cur = (bal.balance && bal.balance.balance) ? +bal.balance.balance : +auth.balance;
      update({
        loggedIn: true,
        account: { loginid: auth.loginid, currency: auth.currency || 'USD', balance: cur, name: auth.loginid, type: auth.is_virtual ? 'Demo' : 'Real' },
        session: Object.assign({}, State.session, { startBalance: cur })
      });
      await apiTicks(State.symbol);
      go('dashboard');
    } catch (e) {
      console.warn('Auto-login failed:', e.message);
      go('login');
    }
  } else {
    go('login');
  }
})();

// Debug helper
window.OVER0 = { State, WS, Engine, Journal, go, update };

</script>
