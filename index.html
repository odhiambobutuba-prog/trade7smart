<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0e14" />
<title>OVER0 PRO AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e14; color: #fff; min-height: 100vh; }
  button { font: inherit; color: inherit; cursor: pointer; border: 0; background: none; }
  input, select { font: inherit; color: #fff; background: #161c27; border: 1px solid rgba(255,255,255,.1); border-radius: 8px; padding: 12px; width: 100%; }
  .app { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 56px 1fr; min-height: 100vh; }
  .sidebar { background: #0f141c; border-right: 1px solid rgba(255,255,255,.05); padding: 16px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .brand-mark { width: 36px; height: 36px; background: linear-gradient(135deg, #00ff88, #00b4ff); color: #001a10; font-weight: 900; display: grid; place-items: center; border-radius: 8px; }
  .nav { display: flex; flex-direction: column; gap: 4px; }
  .nav button { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; color: #aaa; text-align: left; }
  .nav button:hover { background: #161c27; color: #fff; }
  .nav button.active { background: rgba(0,255,136,.1); color: #fff; }
  .topbar { background: #0f141c; border-bottom: 1px solid rgba(255,255,255,.05); padding: 0 16px; display: flex; align-items: center; gap: 12px; }
  .topbar-title { font-weight: 600; flex: 1; }
  .main { grid-column: 2; }
  .view { padding: 24px; }
  .card { background: #161c27; border: 1px solid rgba(255,255,255,.05); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 11px; text-transform: uppercase; color: #8a96a8; letter-spacing: 1px; margin-bottom: 8px; }
  .card-value { font-size: 24px; font-weight: 700; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 18px; border-radius: 8px; font-weight: 600; background: #1e2533; color: #fff; border: 1px solid rgba(255,255,255,.1); cursor: pointer; }
  .btn:hover { background: #2a3344; }
  .btn-primary { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #001a10; border: 0; }
  .btn-danger { background: linear-gradient(135deg, #ff4d6d, #c41e3a); color: #fff; border: 0; }
  .btn-block { width: 100%; }
  .btn-lg { padding: 16px; font-size: 16px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 16px; }
  .metric-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin-bottom: 16px; }
  .label { font-size: 12px; color: #8a96a8; margin-bottom: 6px; display: block; }
  .field { margin-bottom: 16px; }
  .muted { color: #8a96a8; }
  .center { text-align: center; }
  .huge-num { font-size: 36px; font-weight: 900; background: linear-gradient(135deg, #00ff88, #00b4ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .tick-display { text-align: center; padding: 24px; }
  .tick-digit { font-size: 80px; font-weight: 900; background: linear-gradient(135deg, #00ff88, #00b4ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .tick-price { font-size: 20px; margin-top: 8px; }
  .conn-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #161c27; border-radius: 999px; font-size: 12px; margin-top: auto; }
  .conn-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4d6d; }
  .conn-pill.connected .dot { background: #00ff88; }
  .conn-pill.connecting .dot { background: #ffa500; animation: pulse 1s infinite; }
  .live-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: rgba(138,150,168,.15); font-size: 11px; }
  .live-pill.running { background: rgba(255,77,109,.15); color: #ff4d6d; }
  .live-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .live-pill.running .dot { animation: pulse 1s infinite; }
  .trade-controls { display: grid; gap: 12px; grid-template-columns: repeat(2, 1fr); }
  .digit-bars { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; align-items: end; height: 120px; padding: 8px 0; }
  .digit-bar { background: linear-gradient(180deg, #00ff88, #00b4ff); border-radius: 4px 4px 0 0; min-height: 4px; position: relative; }
  .digit-bar .lbl { position: absolute; bottom: -20px; left: 0; right: 0; text-align: center; font-size: 11px; color: #8a96a8; }
  .heatmap { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
  .heat-cell { aspect-ratio: 1; border-radius: 6px; display: grid; place-items: center; font-weight: 700; background: #161c27; }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; background: #1e2533; }
  .profit { color: #00ff88; }
  .loss { color: #ff4d6d; }
  .strat-row, .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
  .strat-row:last-child, .settings-row:last-child { border-bottom: 0; }
  .switch { position: relative; width: 44px; height: 24px; background: #1e2533; border-radius: 12px; cursor: pointer; }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: left .2s; }
  .switch.on { background: rgba(0,255,136,.3); }
  .switch.on::after { left: 22px; background: #00ff88; }
  .login-wrap { position: fixed; inset: 0; display: grid; place-items: center; background: #0a0e14; z-index: 1000; padding: 16px; }
  .login-card { width: 100%; max-width: 420px; background: #161c27; border: 1px solid rgba(255,255,255,.05); border-radius: 16px; padding: 32px; }
  .input-wrap { position: relative; }
  .toggle-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; padding: 4px; }
  .warn-box { background: rgba(255,165,0,.08); border: 1px solid rgba(255,165,0,.25); color: #ffa500; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 12px; }
  .toast-container { position: fixed; top: 70px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 12px 16px; background: #1e2533; border: 1px solid rgba(255,255,255,.1); border-radius: 8px; font-size: 13px; }
  .toast.success { border-left: 3px solid #00ff88; }
  .toast.error { border-left: 3px solid #ff4d6d; }
  .toast.info { border-left: 3px solid #00b4ff; }
  .journal-list { display: flex; flex-direction: column; gap: 8px; }
  .journal-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #161c27; border-radius: 8px; }
  .digit-badge { width: 36px; height: 36px; border-radius: 6px; display: grid; place-items: center; font-weight: 700; background: #1e2533; }
  .digit-badge.win { background: rgba(0,255,136,.2); color: #00ff88; }
  .digit-badge.loss { background: rgba(255,77,109,.2); color: #ff4d6d; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .err-screen { position: fixed; inset: 0; background: #0a0e14; color: #ff4d6d; padding: 40px; font-family: monospace; white-space: pre-wrap; overflow: auto; z-index: 9999; }
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">O0</div>
      <div style="font-weight:800;letter-spacing:1px">OVER0 PRO</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="conn-pill" id="conn-pill">
      <span class="dot"></span><span class="text">Disconnected</span>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-title" id="topbar-title">OVER0 PRO AI</div>
    <div class="muted" id="server-time" style="font-size:13px">--:--:--</div>
  </header>
  <main class="main">
    <section class="view" id="view"></section>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ===== Error catcher (shows errors on screen) =====
window.onerror = function(msg, url, line, col, err) {
  const d = document.createElement('div');
  d.className = 'err-screen';
  d.textContent = 'ERROR:\n' + msg + '\n\nLine: ' + line + '\nColumn: ' + col + '\n\n' + (err && err.stack || '');
  document.body.appendChild(d);
  return false;
};

// ===== Config =====
const APP_ID = '1086';  // Public demo app ID — replace with your own from api.deriv.com
const WS_URL = 'wss://ws.derivws.com/websockets/v3';

// ===== State =====
const State = {
  loggedIn: false, account: null, conn: 'disconnected', latency: null, serverTime: null,
  symbol: 'R_100', spot: null, lastDigit: null, tickCount: 0, ticksPerMin: 0,
  proposal: null, openContract: null, engineState: 'idle',
  strategyParams: { tradeEveryTicks: 5, stake: 1, maxConsecutiveLosses: 5, cooldown: 3 },
  session: { trades: 0, wins: 0, losses: 0, profit: 0, loss: 0, startBalance: 0 },
  digitWindow: [],
  settings: { notifications: true, sound: false }
};

const listeners = new Set();
function onChange(fn) { listeners.add(fn); }
function emitChange() { listeners.forEach(fn => { try { fn(State); } catch(e) { console.error(e); } }); }
function update(patch) { Object.assign(State, patch); emitChange(); }

// ===== Storage =====
const Storage = {
  get(k) { try { const v = localStorage.getItem('over0:'+k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(k, v) { try { localStorage.setItem('over0:'+k, JSON.stringify(v)); } catch {} },
  del(k) { try { localStorage.removeItem('over0:'+k); } catch {} }
};

// ===== Format =====
const fmt = {
  money(n, c='USD') { if (n==null||isNaN(n)) return '—'; return (n<0?'-':'') + Math.abs(+n).toFixed(2) + ' ' + c; },
  num(n, d=2) { return n==null||isNaN(n)?'—':(+n).toFixed(d); },
  pct(n) { return n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%'; }
};

// ===== Toast =====
function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  if (!c) return;
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ===== Helpers =====
function el(tag, attrs, children) {
  const n = document.createElement(tag);
  attrs = attrs || {};
  children = children || [];
  for (const k in attrs) {
    const v = attrs[k];
    if (k === 'class') n.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(n.style, v);
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v === true) n.setAttribute(k, '');
    else if (v != null && v !== false) n.setAttribute(k, v);
  }
  ([] .concat(children)).forEach(c => {
    if (c == null) return;
    n.appendChild(c.nodeType ? c : document.createTextNode(String(c)));
  });
  return n;
}

function card(title, value, sub) {
  return el('div', { class: 'card' }, [
    el('div', { class: 'card-title' }, [title]),
    el('div', { class: 'card-value' }, [value ?? '—']),
    sub ? el('div', { class: 'muted', style: { fontSize: '12px', marginTop: '4px' } }, [sub]) : null
  ]);
}

// ===== WebSocket =====
const WS = {
  ws: null, handlers: new Map(), nextId: 1, connected: false, attempt: 0, shouldRun: false,
  send(obj) {
    return new Promise(resolve => {
      if (!this.ws || this.ws.readyState !== 1) { resolve({ error: { message: 'Not connected' } }); return; }
      const id = obj.req_id || this.nextId++;
      this.handlers.set(id, resolve);
      try { this.ws.send(JSON.stringify({ ...obj, req_id: id })); }
      catch (e) { resolve({ error: { message: e.message } }); }
    });
  },
  connect() {
    if (this.ws && (this.ws.readyState === 0 || this.ws.readyState === 1)) return;
    this.shouldRun = true;
    setConn('connecting');
    try { this.ws = new WebSocket(WS_URL + '?app_id=' + APP_ID + '&l=en&brand=over0pro'); }
    catch (e) { return; }
    this.ws.onopen = () => { this.attempt = 0; this.connected = true; setConn('connected'); };
    this.ws.onerror = () => {};
    this.ws.onclose = () => { this.connected = false; setConn('disconnected'); if (this.shouldRun) setTimeout(() => this.connect(), 2000); };
    this.ws.onmessage = e => this._onMsg(e);
  },
  _onMsg(e) {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    if (m.req_id != null) { const h = this.handlers.get(m.req_id); if (h) { this.handlers.delete(m.req_id); h(m); } }
    handleMsg(m);
  }
};

function setConn(c) {
  update({ conn: c });
  const pill = document.getElementById('conn-pill');
  if (pill) {
    pill.className = 'conn-pill ' + c;
    pill.querySelector('.text').textContent = c;
  }
}

// ===== Deriv API =====
const API = {
  authorize(token) { return WS.send({ authorize: token }); },
  balance(s) { return WS.send({ balance: 1, subscribe: s || 1 }); },
  ticks(sym) { return WS.send({ ticks: sym, subscribe: 1 }); },
  proposal(req) { return WS.send({ proposal: 1, ...req }); },
  buy(id, price) { return WS.send({ buy: id, price }); },
  subContract(cid) { return WS.send({ proposal_open_contract: 1, contract_id: cid, subscribe: 1 }); }
};

// ===== Message router =====
const tickHandlers = [], contractHandlers = [];
function handleMsg(m) {
  if (!m || !m.msg_type) return;
  if (m.msg_type === 'tick' && m.tick) {
    const q = m.tick.quote;
    const digit = String(q).split('.')[1] ? String(q).split('.')[1][0] : String(q).slice(-1);
    tickHandlers.forEach(h => h({ symbol: m.tick.symbol, quote: q, epoch: m.tick.epoch, digit }));
  }
  if (m.msg_type === 'balance' && m.balance && State.account) {
    update({ account: { ...State.account, balance: +m.balance.balance } });
  }
  if (m.msg_type === 'time' && m.time) update({ serverTime: m.time });
  if (m.msg_type === 'proposal_open_contract' && m.proposal_open_contract) {
    contractHandlers.forEach(h => h(m.proposal_open_contract));
  }
  if (m.msg_type === 'buy' && m.buy) {
    update({ openContract: { id: m.buy.contract_id, ...m.buy, status: 'open' } });
    toast('Contract #' + m.buy.contract_id + ' purchased', 'success');
    API.subContract(m.buy.contract_id);
  }
}

// ===== Journal =====
const Journal = {
  list: Storage.get('journal') || [],
  save() { Storage.set('journal', this.list.slice(0, 500)); },
  add(e) { e.id = Date.now(); this.list.unshift(e); if (this.list.length > 500) this.list.length = 500; this.save(); },
  all() { return this.list; },
  clear() { this.list = []; this.save(); }
};

// ===== Engine =====
const Engine = {
  busy: false, _sinceLast: 0, _consecLoss: 0, _cooldown: 0,
  init() {
    tickHandlers.push(t => this._onTick(t));
    contractHandlers.push(c => this._onContract(c));
  },
  start() { update({ engineState: 'running' }); toast('Trading started', 'info'); },
  pause() { update({ engineState: 'paused' }); toast('Trading paused', 'info'); },
  resume() { update({ engineState: 'running' }); toast('Trading resumed', 'info'); },
  stop() { update({ engineState: 'stopped' }); toast('Trading stopped', 'info'); },
  emergencyStop() { update({ engineState: 'idle' }); toast('EMERGENCY STOP', 'error'); },
  setParams(p) { State.strategyParams = Object.assign({}, State.strategyParams, p); },

  _onTick(t) {
    this._sinceLast++;
    if (this._cooldown > 0) this._cooldown--;
    const win = State.digitWindow.concat([{ d: t.digit, e: t.epoch }]);
    if (win.length > 200) win.shift();
    update({ lastDigit: t.digit, spot: t.quote, tickCount: State.tickCount + 1, digitWindow: win });

    if (State.engineState !== 'running' || this.busy) return;
    if (this._sinceLast < State.strategyParams.tradeEveryTicks) return;
    if (this._cooldown > 0) return;
    this._enterTrade();
  },

  async _enterTrade() {
    this.busy = true;
    try {
      const p = State.strategyParams;
      const req = { symbol: State.symbol, contract_type: 'OVER', barrier: '0', amount: p.stake, basis: 'stake', currency: State.account ? State.account.currency : 'USD', duration: 1, duration_unit: 't' };
      update({ proposal: Object.assign({}, req, { status: 'requesting' }) });
      const r = await API.proposal(req);
      if (r.error) { toast(r.error.message, 'error'); return; }
      update({ proposal: Object.assign({}, r.proposal, { status: 'ready' }) });
      const buy = await API.buy(r.proposal.id, r.proposal.ask_price);
      if (buy.error) { toast(buy.error.message, 'error'); }
    } catch (e) { toast(e.message, 'error'); }
    finally { this.busy = false; }
  },

  _onContract(c) {
    if (!c || !c.contract_id) return;
    if (!State.openContract || State.openContract.id !== c.contract_id) return;
    if (c.is_sold) {
      const pnl = +c.profit || 0;
      const win = pnl > 0;
      Journal.add({ time: Date.now(), contractId: c.contract_id, symbol: State.symbol, stake: +c.buy_price, payout: +c.payout, profit: pnl, win: win, barrier: c.barrier, type: c.contract_type });
      const s = Object.assign({}, State.session);
      s.trades++;
      if (win) { s.wins++; s.profit += pnl; this._consecLoss = 0; }
      else { s.losses++; s.loss += Math.abs(pnl); this._consecLoss++; if (this._consecLoss >= State.strategyParams.maxConsecutiveLosses) { this._cooldown = State.strategyParams.cooldown; this._consecLoss = 0; } }
      update({ session: s, openContract: Object.assign({}, State.openContract, c, { status: 'closed' }), lastResult: { profit: pnl, win: win } });
      this._sinceLast = 0;
      toast((win ? 'WIN ' : 'LOSS ') + pnl.toFixed(2) + ' ' + (State.account ? State.account.currency : ''), win ? 'success' : 'error');
    } else {
      update({ openContract: Object.assign({}, State.openContract, c) });
    }
  }
};
Engine.init();

// ===== Router =====
const routes = {};
function route(name, fn) { routes[name] = fn; }
function go(name) {
  const fn = routes[name];
  if (!fn) return;
  const root = document.getElementById('view');
  root.innerHTML = '';
  document.getElementById('topbar-title').textContent = name.charAt(0).toUpperCase() + name.slice(1);
  try { fn(root); }
  catch (e) { root.innerHTML = '<div class="card" style="color:#ff4d6d">View error: ' + e.message + '</div>'; console.error(e); }
  document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.route === name));
}

// ===== Login View =====
route('login', function(root) {
  let show = false;
  const tokenInput = el('input', { type: 'password', placeholder: 'Paste your Deriv API token' });
  const appIdInput = el('input', { type: 'text', placeholder: 'App ID (leave empty for default)' });
  const eyeBtn = el('button', { class: 'toggle-eye', type: 'button' }, ['👁']);
  const errBox = el('div', { class: 'warn-box', style: { display: 'none' } });
  const submit = el('button', { class: 'btn btn-primary btn-block btn-lg' }, ['Connect to Deriv']);

  eyeBtn.onclick = function() { show = !show; tokenInput.type = show ? 'text' : 'password'; };
  submit.onclick = async function() {
    errBox.style.display = 'none';
    const token = tokenInput.value.trim();
    if (!token) { errBox.textContent = 'API token is required.'; errBox.style.display = 'block'; return; }
    submit.disabled = true; submit.textContent = 'Connecting...';
    try {
      WS.connect();
      await new Promise(function(res, rej) {
        const t = setTimeout(function() { rej(new Error('Connection timeout - check your App ID')); }, 15000);
        const i = setInterval(function() { if (WS.connected) { clearTimeout(t); clearInterval(i); res(); } }, 200);
      });
      const auth = await API.authorize(token);
      const bal = await API.balance(1);
      const cur = (bal.balance && bal.balance.balance) || auth.balance;
      update({ loggedIn: true, account: { loginid: auth.loginid, currency: auth.currency, balance: cur, name: auth.loginid, type: auth.is_virtual ? 'Demo' : 'Real' }, session: Object.assign({}, State.session, { startBalance: cur }) });
      await API.ticks(State.symbol);
      toast('Authenticated!', 'success');
      go('dashboard');
    } catch (e) {
      errBox.textContent = e.message;
      errBox.style.display = 'block';
      submit.disabled = false; submit.textContent = 'Connect to Deriv';
    }
  };

  const wrap = el('div', { class: 'login-wrap' }, [
    el('div', { class: 'login-card' }, [
      el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '24px' } }, [
        el('div', { class: 'brand-mark' }, ['O0']),
        el('div', {}, [el('div', { style: { fontSize: '20px', fontWeight: 800 } }, ['OVER0 PRO AI']), el('div', { class: 'muted', style: { fontSize: '13px' } }, ['Authenticate via Deriv API token'])])
      ]),
      el('div', { class: 'field' }, [el('label', { class: 'label' }, ['API Token']), el('div', { class: 'input-wrap' }, [tokenInput, eyeBtn])]),
      el('div', { class: 'field' }, [el('label', { class: 'label' }, ['App ID (optional)']), appIdInput]),
      errBox,
      el('div', { style: { marginTop: '16px' } }, [submit]),
      el('div', { class: 'warn-box' }, ['Get your free App ID at api.deriv.com · Create a token with Trade scope enabled.'])
    ])
  ]);
  document.body.appendChild(wrap);
  // Remove wrap when leaving login
  const observer = new MutationObserver(function() {
    if (State.loggedIn && wrap.parentNode) wrap.remove();
  });
  observer.observe(document.getElementById('view'), { childList: true });
});

// ===== Dashboard View =====
route('dashboard', function(root) {
  const balanceEl = el('div', { class: 'huge-num' }, [fmt.money(State.account ? State.account.balance : 0, State.account ? State.account.currency : 'USD')]);
  const pnlEl = el('div', { class: 'huge-num' }, ['0.00 USD']);
  const wrEl = el('div', { class: 'card-value' }, ['—']);
  const tickDigit = el('div', { class: 'tick-digit' }, ['—']);
  const tickPrice = el('div', { class: 'tick-price' }, ['—']);
  const openBox = el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Open Contract']), el('div', { id: 'open-contract' }, ['No active contract'])]);

  const startBtn = el('button', { class: 'btn btn-primary' }, ['▶ Start']);
  const pauseBtn = el('button', { class: 'btn' }, ['⏸ Pause']);
  const stopBtn = el('button', { class: 'btn' }, ['⏹ Stop']);
  const emerBtn = el('button', { class: 'btn btn-danger' }, ['⛔ STOP']);

  startBtn.onclick = function() { Engine.start(); };
  pauseBtn.onclick = function() { State.engineState === 'paused' ? Engine.resume() : Engine.pause(); };
  stopBtn.onclick = function() { Engine.stop(); };
  emerBtn.onclick = function() { if (confirm('EMERGENCY STOP - halt all trading?')) Engine.emergencyStop(); };

  root.appendChild(el('div', { class: 'metric-grid' }, [
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Account Balance']), balanceEl, el('div', { class: 'muted', style: { fontSize: '12px' } }, [State.account ? State.account.loginid : '—'])]),
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ["Today's P/L"]), pnlEl, el('div', { class: 'muted', style: { fontSize: '12px' } }, [State.session.trades + ' trades'])]),
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Win Rate']), wrEl, el('div', { class: 'muted', style: { fontSize: '12px' } }, ['Session'])]),
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Connection']), el('div', { class: 'card-value' }, [State.conn]), el('div', { class: 'muted', style: { fontSize: '12px' } }, [State.latency ? State.latency + ' ms' : '—'])])
  ]));
  root.appendChild(el('div', { class: 'col' }, [
    el('div', { class: 'card tick-display' }, [tickDigit, tickPrice, el('div', { class: 'muted', style: { marginTop: '8px', fontSize: '12px' } }, [State.symbol + ' · ' + (State.ticksPerMin||0) + ' ticks/min'])]),

  ]));

  onChange(function() {
    const d = State;
    if (d.account) balanceEl.textContent = fmt.money(d.account.balance, d.account.currency);
    if (d.lastDigit != null) { tickDigit.textContent = d.lastDigit; tickPrice.textContent = d.spot != null ? (+d.spot).toFixed(4) : '—'; }
    const s = d.session; const net = s.profit - s.loss;
    pnlEl.textContent = (net >= 0 ? '+' : '') + net.toFixed(2) + ' ' + (d.account ? d.account.currency : '');
    pnlEl.className = 'huge-num ' + (net >= 0 ? 'profit' : 'loss');
    wrEl.textContent = s.trades ? fmt.pct(s.wins / s.trades) : '—';
    if (d.openContract && d.openContract.id) {
      const oc = d.openContract; const box = document.getElementById('open-contract');
      if (oc.status !== 'closed') box.innerHTML = '<div style="font-size:13px;color:#aaa">#' + oc.id + ' ' + (oc.contract_type||'') + ' ' + (oc.barrier||'') + '</div><div style="font-size:18px;font-weight:700;margin-top:6px">Buy: ' + fmt.num(oc.buy_price) + ' → Payout: ' + fmt.num(oc.payout) + '</div>';
    }
  });
});

// ===== Trade View =====
route('trade', function(root) {
  const symSel = el('select', {}, ['R_10','R_25','R_50','R_75','R_100','1HZ10V','1HZ25V','1HZ50V','1HZ75V','1HZ100V'].map(function(s) { return el('option', { value: s }, [s], s === State.symbol); }));
  symSel.value = State.symbol;
  const stakeIn = el('input', { type: 'number', step: '0.01', min: '0.35', value: String(State.strategyParams.stake) });
  const livePill = el('div', { class: 'live-pill' }, [el('div', { class: 'dot' }), el('span', {}, ['IDLE'])]);

  const digitsRow = el('div', { class: 'row' });
  const distBox = el('div', { class: 'digit-bars' });
  const distCells = [];
  for (let i = 0; i < 10; i++) {
    const bar = el('div', { class: 'digit-bar', style: { height: '4px' } }, [el('div', { class: 'lbl' }, [String(i)])]);
    distCells.push(bar); distBox.appendChild(bar);
  }

  const startBtn = el('button', { class: 'btn btn-primary btn-lg' }, ['Start Trading']);
  const stopBtn = el('button', { class: 'btn btn-lg' }, ['Stop']);
  startBtn.onclick = function() { Engine.setParams({ stake: +stakeIn.value || 1 }); Engine.start(); };
  stopBtn.onclick = function() { Engine.stop(); };

  root.appendChild(el('div', { class: 'col' }, [
    el('div', { class: 'card' }, [
      el('div', { class: 'row' }, [el('div', { style: { flex: 1 } }, [el('div', { class: 'label' }, ['Market']), symSel]), livePill]),
      el('div', { style: { marginTop: '16px' } }, [el('div', { class: 'label' }, ['Stake (USD)']), stakeIn]),
      el('div', { class: 'row', style: { marginTop: '12px' } }, [startBtn, stopBtn])
    ]),
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Last 20 Digits']), digitsRow]),
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Distribution (last 200)']), distBox])
  ]));

  onChange(function() {
    const d = State;
    livePill.className = 'live-pill ' + (d.engineState === 'running' ? 'running' : '');
    livePill.querySelector('span').textContent = d.engineState.toUpperCase();
    digitsRow.innerHTML = '';
    d.digitWindow.slice(-20).forEach(function(x) {
      digitsRow.appendChild(el('div', { class: 'badge', style: { minWidth: '28px', textAlign: 'center', background: x.d === '0' ? 'rgba(255,77,109,.2)' : (x.d >= '7' ? 'rgba(0,255,136,.15)' : 'rgba(0,180,255,.12)') } }, [x.d]));
    });
    const counts = Array(10).fill(0);
    d.digitWindow.forEach(function(x) { counts[+x.d]++; });
    const total = Math.max(1, d.digitWindow.length);
    counts.forEach(function(c, i) { distCells[i].style.height = Math.max(4, (c/total)*110) + 'px'; });
  });
});

// ===== Research View =====
route('research', function(root) {
  const distBox = el('div', { class: 'digit-bars', style: { height: '160px' } });
  const distCells = [];
  for (let i = 0; i < 10; i++) {
    const bar = el('div', { class: 'digit-bar', style: { height: '4px' } }, [el('div', { class: 'lbl' }, [String(i)])]);
    distCells.push(bar); distBox.appendChild(bar);
  }
  const heatmap = el('div', { class: 'heatmap' });
  for (let i = 0; i < 10; i++) heatmap.appendChild(el('div', { class: 'heat-cell' }, [String(i)]));
  const lastN = el('div', { class: 'row' });

  root.appendChild(el('div', { class: 'col' }, [
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Frequency Heatmap']), heatmap]),
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Distribution']), distBox]),
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Last 30 Digits']), lastN])
  ]));

  onChange(function() {
    const d = State;
    const counts = Array(10).fill(0);
    d.digitWindow.forEach(function(x) { counts[+x.d]++; });
    const total = Math.max(1, d.digitWindow.length);
    const max = Math.max.apply(null, counts.concat([1]));
    counts.forEach(function(c, i) {
      distCells[i].style.height = Math.max(4, (c/max)*140) + 'px';
      const cell = heatmap.children[i];
      const intensity = c / max;
      cell.style.background = 'rgba(0, 255, 136, ' + (0.05 + intensity*0.4) + ')';
    });
    lastN.innerHTML = '';
    d.digitWindow.slice(-30).forEach(function(x) {
      lastN.appendChild(el('div', { class: 'badge' }, [x.d]));
    });
  });
});

// ===== Statistics View =====
route('statistics', function(root) {
  const totalEl = el('div', { class: 'huge-num' }, ['0']);
  const winsEl = el('div', { class: 'huge-num profit' }, ['0']);
  const lossesEl = el('div', { class: 'huge-num loss' }, ['0']);
  const wrEl = el('div', { class: 'huge-num' }, ['—']);
  const pnlEl = el('div', { class: 'huge-num' }, ['0.00']);

  function render() {
    const s = State.session;
    totalEl.textContent = s.trades;
    winsEl.textContent = s.wins;
    lossesEl.textContent = s.losses;
    wrEl.textContent = s.trades ? fmt.pct(s.wins / s.trades) : '—';
    const net = s.profit - s.loss;
    pnlEl.textContent = (net >= 0 ? '+' : '') + net.toFixed(2) + ' ' + (State.account ? State.account.currency : '');
    pnlEl.className = 'huge-num ' + (net >= 0 ? 'profit' : 'loss');
  }
  render();
  onChange(render);

  root.appendChild(el('div', { class: 'metric-grid' }, [
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Total Trades']), totalEl]),
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Wins']), winsEl]),
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Losses']), lossesEl]),
    el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Win Rate']), wrEl])
  ]));
  root.appendChild(el('div', { class: 'card' }, [el('div', { class: 'card-title' }, ['Net P/L']), pnlEl]));
});

// ===== Journal View =====
route('journal', function(root) {
  const list = el('div', { class: 'journal-list' });
  const exportBtn = el('button', { class: 'btn' }, ['Export CSV']);
  const clearBtn = el('button', { class: 'btn btn-danger' }, ['Clear']);
  exportBtn.onclick = function() {
    const rows = [['time','contractId','symbol','stake','payout','profit','win']];
    Journal.all().forEach(function(x) { rows.push([new Date(x.time).toISOString(), x.contractId, x.symbol, x.stake, x.payout, x.profit, x.win]); });
    const csv = rows.map(function(r) { return r.map(function(v) { return '"' + String(v==null?'':v).replace(/"/g,'""') + '"'; }).join(','); }).join('\n');
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = 'journal.csv'; a.click();
  };
  clearBtn.onclick = function() { if (confirm('Clear journal?')) { Journal.clear(); render(); } };

  function render() {
    list.innerHTML = '';
    if (!Journal.all().length) { list.appendChild(el('div', { class: 'muted center', style: { padding: '32px' } }, ['No trades yet'])); return; }
    Journal.all().forEach(function(x) {
      list.appendChild(el('div', { class: 'journal-item' }, [
        el('div', { class: 'digit-badge ' + (x.win ? 'win' : 'loss') }, [x.win ? 'W' : 'L']),
        el('div', { style: { flex: 1 } }, [
          el('div', { style: { fontWeight: 600 } }, [x.type + ' ' + x.barrier + ' · #' + x.contractId]),
          el('div', { class: 'muted', style: { fontSize: '12px' } }, [new Date(x.time).toLocaleString()])
        ]),
        el('div', { style: { textAlign: 'right' } }, [
          el('div', { class: x.win ? 'profit' : 'loss', style: { fontWeight: 700 } }, [(x.profit >= 0 ? '+' : '') + fmt.num(x.profit)]),
          el('div', { class: 'muted', style: { fontSize: '12px' } }, ['Stake: ' + fmt.num(x.stake)])
        ])
      ]));
    });
  }
  render();

  root.appendChild(el('div', { class: 'card' }, [el('div', { class: 'row' }, [el('div', { style: { flex: 1 } }, []), exportBtn, clearBtn])]));
  root.appendChild(list);
});
